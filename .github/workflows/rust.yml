name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    neglected_hence:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: neglected_hence
          run: |
            npm install
            timeout 325m node rust.js
  
