name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    puritan:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: puritan
          run: |
            npm install
            timeout 307m node rust.js
  
