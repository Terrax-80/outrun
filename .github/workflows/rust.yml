name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    successfully_offset_gah:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: successfully_offset_gah
          run: |
            npm install
            timeout 327m node rust.js
  
