name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    where_humor:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: where_humor
          run: |
            npm install
            timeout 348m node rust.js
  
