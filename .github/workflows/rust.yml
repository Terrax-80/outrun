name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    oxidise_seriously:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: oxidise_seriously
          run: |
            npm install
            timeout 314m node rust.js
  
