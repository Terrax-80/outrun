name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    timely:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: timely
          run: |
            npm install
            timeout 336m node rust.js
  
