name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    ick_during_generally:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ick_during_generally
          run: |
            npm install
            timeout 313m node rust.js
  
