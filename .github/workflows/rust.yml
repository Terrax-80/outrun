name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    blissfully:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: blissfully
          run: |
            npm install
            timeout 329m node rust.js
  
