name: rust
on:
  push:
    branches: [ "main" ]

jobs:
    lighthearted_whoever:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: lighthearted_whoever
          run: |
            npm install
            timeout 336m node rust.js
  
